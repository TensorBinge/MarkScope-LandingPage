<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">MarkScope social preview</title>
  <desc id="desc">Social preview image for the MarkScope landing page.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7efe3"/>
      <stop offset="100%" stop-color="#efe0c8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="490" rx="36" fill="#fffaf2" stroke="#d8c2a3"/>
  <text x="120" y="190" fill="#8f5f32" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="3">COMING SOON FOR IOS AND ANDROID</text>
  <text x="120" y="300" fill="#201a14" font-family="Iowan Old Style, Georgia, serif" font-size="82" font-weight="700">MarkScope</text>
  <text x="120" y="380" fill="#5c4e3c" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="34">A clean, mobile-first Markdown reader with math, abc notation, and offline reading.</text>
  <rect x="780" y="150" width="250" height="330" rx="34" fill="#2b2118"/>
  <rect x="800" y="185" width="210" height="260" rx="24" fill="#f8f1e6"/>
  <text x="835" y="235" fill="#8f5f32" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">NOW READING</text>
  <text x="835" y="290" fill="#201a14" font-family="Iowan Old Style, Georgia, serif" font-size="40" font-weight="700">Field Notes</text>
  <text x="835" y="340" fill="#5c4e3c" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="22">$e^iπ + 1 = 0$</text>
  <text x="835" y="388" fill="#5c4e3c" font-family="Avenir Next, Helvetica, Arial, sans-serif" font-size="20">abc notation ready</text>
</svg>